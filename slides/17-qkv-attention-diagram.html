<section data-id="qkv-attention-diagram" data-title="QKV Attention Flow">
  <div class="slide-content">
    <h2><span class="highlight">Attention</span> Flow</h2>

    <div class="svg-fill">
      <svg class="svg-diagram" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">

        <!-- Token -->
        <rect class="svg-box" x="20" y="110" width="100" height="50"/>
        <text class="svg-text" style="font-size:15px" x="70" y="135">Token</text>

        <!-- Weight matrices -->
        <text class="svg-muted" x="210" y="30">W</text>
        <rect class="svg-box" x="165" y="40" width="90" height="40"/>
        <text class="svg-label" x="210" y="60">W_Q</text>

        <rect class="svg-box" x="165" y="110" width="90" height="40"/>
        <text class="svg-label" x="210" y="130">W_K</text>

        <rect class="svg-box" x="165" y="180" width="90" height="40"/>
        <text class="svg-label" x="210" y="200">W_V</text>

        <!-- Arrows token -> weights -->
        <line class="svg-arrow" x1="120" y1="125" x2="163" y2="62"/>
        <line class="svg-arrow" x1="120" y1="135" x2="163" y2="130"/>
        <line class="svg-arrow" x1="120" y1="145" x2="163" y2="198"/>

        <!-- Q, K, V outputs -->
        <rect class="svg-accent-box" x="310" y="40" width="70" height="40"/>
        <text class="svg-text" style="fill: var(--color-accent); font-size:15px" x="345" y="60">Q</text>

        <rect class="svg-accent-box" x="310" y="110" width="70" height="40"/>
        <text class="svg-text" style="fill: var(--color-accent); font-size:15px" x="345" y="130">K</text>

        <rect class="svg-accent-box" x="310" y="180" width="70" height="40"/>
        <text class="svg-text" style="fill: var(--color-accent); font-size:15px" x="345" y="200">V</text>

        <!-- Arrows weights -> QKV -->
        <line class="svg-arrow" x1="255" y1="60" x2="308" y2="60"/>
        <line class="svg-arrow" x1="255" y1="130" x2="308" y2="130"/>
        <line class="svg-arrow" x1="255" y1="200" x2="308" y2="200"/>

        <!-- Dot product Q*K -->
        <line class="svg-arrow" x1="380" y1="55" x2="450" y2="95"/>
        <line class="svg-arrow" x1="380" y1="135" x2="450" y2="105"/>

        <rect class="svg-accent-box" x="455" y="82" width="110" height="40"/>
        <text class="svg-text" style="font-size: 13px;" x="510" y="96">Q &middot; K</text>
        <text class="svg-muted" style="font-size: 11px;" x="510" y="112">attention score</text>

        <!-- Score * V -->
        <line class="svg-arrow" x1="565" y1="102" x2="618" y2="135"/>
        <line class="svg-arrow" x1="380" y1="200" x2="618" y2="155"/>

        <rect class="svg-accent-box" x="622" y="125" width="140" height="50" style="stroke-width: 2.5;"/>
        <text class="svg-text" style="font-size: 13px; fill: var(--color-accent);" x="692" y="144">score &times; V</text>
        <text class="svg-muted" style="font-size: 11px;" x="692" y="162">output</text>

        <!-- Summary formula -->
        <text class="svg-muted" style="font-size: 14px;" x="400" y="260">Attention(Q, K, V) = softmax(Q &middot; K) &times; V</text>
      </svg>
    </div>

    <p class="fragment" style="text-align: center; margin-top: 1rem; color: var(--color-text-muted); font-size: 0.85em;">
      The dot product of Q and K is exactly the same operation as on the <span class="highlight">previous slide</span> — now it determines how much attention tokens pay to each other.
    </p>
  </div>
</section>
