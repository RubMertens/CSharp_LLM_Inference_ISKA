<section data-id="qkv-attention" data-title="Query, Key, Value">
  <div class="slide-content">
    <h2><span class="highlight">Q</span>uery, <span class="highlight">K</span>ey, <span class="highlight">V</span>alue</h2>
    <p style="color: var(--color-text-muted); margin-bottom: 1rem;">Elk token wordt 3 vectoren — the heart of self-attention</p>

    <div class="three-column fragment" style="margin-bottom: 1.5rem;">
      <div style="text-align: center; padding: 1rem; background: var(--color-bg-subtle); border-radius: 8px; border: 1px solid var(--color-border);">
        <div style="font-size: 2em; font-weight: 700; color: var(--color-accent);">Q</div>
        <div style="font-weight: 600; margin: 0.3rem 0;">Query</div>
        <div style="color: var(--color-text-muted); font-size: 0.85em;">"Wat zoek ik?"</div>
      </div>
      <div style="text-align: center; padding: 1rem; background: var(--color-bg-subtle); border-radius: 8px; border: 1px solid var(--color-border);">
        <div style="font-size: 2em; font-weight: 700; color: var(--color-accent);">K</div>
        <div style="font-weight: 600; margin: 0.3rem 0;">Key</div>
        <div style="color: var(--color-text-muted); font-size: 0.85em;">"Wat bevat ik?"</div>
      </div>
      <div style="text-align: center; padding: 1rem; background: var(--color-bg-subtle); border-radius: 8px; border: 1px solid var(--color-border);">
        <div style="font-size: 2em; font-weight: 700; color: var(--color-accent);">V</div>
        <div style="font-weight: 600; margin: 0.3rem 0;">Value</div>
        <div style="color: var(--color-text-muted); font-size: 0.85em;">"Wat bied ik aan?"</div>
      </div>
    </div>

    <svg viewBox="0 0 800 280" style="width: 100%; max-width: 780px; display: block; margin: 0 auto;" xmlns="http://www.w3.org/2000/svg" class="fragment">
      <style>
        .qkv-box { fill: var(--color-bg-subtle, #111827); stroke: var(--color-border, #1e293b); stroke-width: 1.5; rx: 8; }
        .qkv-accent { fill: rgba(56, 189, 248, 0.08); stroke: var(--color-accent, #38bdf8); stroke-width: 1.5; rx: 8; }
        .qkv-text { fill: var(--color-text, #e2e8f0); font-family: "SF Mono", Consolas, monospace; font-size: 15px; text-anchor: middle; dominant-baseline: central; }
        .qkv-label { fill: var(--color-accent, #38bdf8); font-family: "SF Mono", Consolas, monospace; font-size: 13px; text-anchor: middle; dominant-baseline: central; font-weight: bold; }
        .qkv-muted { fill: var(--color-text-muted, #94a3b8); font-family: "SF Mono", Consolas, monospace; font-size: 13px; text-anchor: middle; dominant-baseline: central; }
        .qkv-arrow { stroke: var(--color-accent, #38bdf8); stroke-width: 1.5; opacity: 0.5; fill: none; marker-end: url(#qkv-arrowhead); }
      </style>
      <defs>
        <marker id="qkv-arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--color-accent, #38bdf8)" opacity="0.5"/>
        </marker>
      </defs>

      <!-- Token -->
      <rect class="qkv-box" x="20" y="110" width="100" height="50"/>
      <text class="qkv-text" x="70" y="135">Token</text>

      <!-- Weight matrices -->
      <text class="qkv-muted" x="210" y="30">W</text>
      <rect class="qkv-box" x="165" y="40" width="90" height="40"/>
      <text class="qkv-label" x="210" y="60">W_Q</text>

      <rect class="qkv-box" x="165" y="110" width="90" height="40"/>
      <text class="qkv-label" x="210" y="130">W_K</text>

      <rect class="qkv-box" x="165" y="180" width="90" height="40"/>
      <text class="qkv-label" x="210" y="200">W_V</text>

      <!-- Arrows token -> weights -->
      <line class="qkv-arrow" x1="120" y1="125" x2="163" y2="62"/>
      <line class="qkv-arrow" x1="120" y1="135" x2="163" y2="130"/>
      <line class="qkv-arrow" x1="120" y1="145" x2="163" y2="198"/>

      <!-- Q, K, V outputs -->
      <rect class="qkv-accent" x="310" y="40" width="70" height="40"/>
      <text class="qkv-text" style="fill: var(--color-accent);" x="345" y="60">Q</text>

      <rect class="qkv-accent" x="310" y="110" width="70" height="40"/>
      <text class="qkv-text" style="fill: var(--color-accent);" x="345" y="130">K</text>

      <rect class="qkv-accent" x="310" y="180" width="70" height="40"/>
      <text class="qkv-text" style="fill: var(--color-accent);" x="345" y="200">V</text>

      <!-- Arrows weights -> QKV -->
      <line class="qkv-arrow" x1="255" y1="60" x2="308" y2="60"/>
      <line class="qkv-arrow" x1="255" y1="130" x2="308" y2="130"/>
      <line class="qkv-arrow" x1="255" y1="200" x2="308" y2="200"/>

      <!-- Dot product Q*K -->
      <line class="qkv-arrow" x1="380" y1="55" x2="450" y2="95"/>
      <line class="qkv-arrow" x1="380" y1="135" x2="450" y2="105"/>

      <rect class="qkv-accent" x="455" y="82" width="110" height="40"/>
      <text class="qkv-text" style="font-size: 13px;" x="510" y="96">Q &middot; K</text>
      <text class="qkv-muted" style="font-size: 11px;" x="510" y="112">attention score</text>

      <!-- Score * V -->
      <line class="qkv-arrow" x1="565" y1="102" x2="618" y2="135"/>
      <line class="qkv-arrow" x1="380" y1="200" x2="618" y2="155"/>

      <rect class="qkv-accent" x="622" y="125" width="140" height="50" style="stroke-width: 2.5;"/>
      <text class="qkv-text" style="font-size: 13px; fill: var(--color-accent);" x="692" y="144">score &times; V</text>
      <text class="qkv-muted" style="font-size: 11px;" x="692" y="162">output</text>

      <!-- Summary formula -->
      <text class="qkv-muted" style="font-size: 14px;" x="400" y="260">Attention(Q, K, V) = softmax(Q &middot; K) &times; V</text>
    </svg>

    <p class="fragment" style="text-align: center; margin-top: 1rem; color: var(--color-text-muted); font-size: 0.85em;">
      Het dot product van Q en K is exact dezelfde operatie als op de <span class="highlight">vorige slide</span> — nu bepaalt het hoeveel aandacht tokens aan elkaar geven.
    </p>
  </div>
</section>
