<section data-id="single-head-attention" data-title="Single-Head Self-Attention">
  <div class="slide-content">
    <h2><span class="highlight">Masked Self-Attention</span> — Step by Step</h2>
    <p style="color: var(--color-text-muted); margin-bottom: 0.6rem;">How tokens learn which other tokens are important</p>

    <svg viewBox="0 0 920 520" class="svg-diagram" style="max-width: 900px;" xmlns="http://www.w3.org/2000/svg">

      <!-- Fragment 0: Tokens with Q, K, V vectors -->
      <!-- Token boxes -->
      <rect class="svg-accent-box" x="15" y="30" width="80" height="36"/>
      <text class="svg-token" x="55" y="48">"The"</text>

      <rect class="svg-accent-box" x="15" y="80" width="80" height="36"/>
      <text class="svg-token" x="55" y="98">"cat"</text>

      <rect class="svg-accent-box" x="15" y="130" width="80" height="36"/>
      <text class="svg-token" x="55" y="148">"sits"</text>

      <!-- Q vectors -->
      <text class="svg-label" style="font-size: 12px;" x="140" y="20">Q</text>
      <rect class="svg-box" x="115" y="33" width="50" height="30"/>
      <text class="svg-num" x="140" y="48">1, 0</text>
      <rect class="svg-box" x="115" y="83" width="50" height="30"/>
      <text class="svg-num" x="140" y="98">0, 1</text>
      <rect class="svg-box" x="115" y="133" width="50" height="30"/>
      <text class="svg-num" x="140" y="148">1, 1</text>

      <!-- K vectors -->
      <text class="svg-label" style="font-size: 12px;" x="200" y="20">K</text>
      <rect class="svg-box" x="175" y="33" width="50" height="30"/>
      <text class="svg-num" x="200" y="48">1, 1</text>
      <rect class="svg-box" x="175" y="83" width="50" height="30"/>
      <text class="svg-num" x="200" y="98">0, 1</text>
      <rect class="svg-box" x="175" y="133" width="50" height="30"/>
      <text class="svg-num" x="200" y="148">1, 0</text>

      <!-- V vectors -->
      <text class="svg-label" style="font-size: 12px;" x="260" y="20">V</text>
      <rect class="svg-box" x="235" y="33" width="50" height="30"/>
      <text class="svg-num" x="260" y="48">3, 1</text>
      <rect class="svg-box" x="235" y="83" width="50" height="30"/>
      <text class="svg-num" x="260" y="98">0, 4</text>
      <rect class="svg-box" x="235" y="133" width="50" height="30"/>
      <text class="svg-num" x="260" y="148">2, 2</text>

      <!-- Fragment 1: Attention score matrix Q × K^T -->
      <g class="fragment" data-fragment-index="1">
        <line class="svg-arrow" x1="168" y1="90" x2="320" y2="50"/>

        <text class="svg-heading" x="430" y="20">Q &times; K&#7488; + mask</text>
        <text class="svg-text-xs svg-muted" x="430" y="35">future → -∞ (causal mask)</text>

        <!-- Column headers -->
        <text class="svg-text-xs svg-muted" x="385" y="52">The</text>
        <text class="svg-text-xs svg-muted" x="430" y="52">cat</text>
        <text class="svg-text-xs svg-muted" x="475" y="52">sits</text>

        <!-- Row labels -->
        <text class="svg-text-xs svg-muted" x="340" y="78">The</text>
        <text class="svg-text-xs svg-muted" x="340" y="118">cat</text>
        <text class="svg-text-xs svg-muted" x="340" y="158">sits</text>

        <!-- Row 0: Q_the · K_the=1, masked: cat, sits -->
        <rect class="svg-cell" x="363" y="62" width="44" height="32"/>
        <text class="svg-num" x="385" y="78">1</text>
        <rect class="svg-cell-blocked" x="408" y="62" width="44" height="32"/>
        <text class="svg-num svg-muted" x="430" y="78">-∞</text>
        <rect class="svg-cell-blocked" x="453" y="62" width="44" height="32"/>
        <text class="svg-num svg-muted" x="475" y="78">-∞</text>

        <!-- Row 1: Q_cat · K_the=1, Q_cat · K_cat=1, masked: sits -->
        <rect class="svg-cell" x="363" y="102" width="44" height="32"/>
        <text class="svg-num" x="385" y="118">1</text>
        <rect class="svg-cell" x="408" y="102" width="44" height="32"/>
        <text class="svg-num" x="430" y="118">1</text>
        <rect class="svg-cell-blocked" x="453" y="102" width="44" height="32"/>
        <text class="svg-num svg-muted" x="475" y="118">-∞</text>

        <!-- Row 2: Q_sits=[1,1], K_the=[1,1]→2, K_cat=[0,1]→1, K_sits=[1,0]→1 -->
        <rect class="svg-cell" x="363" y="142" width="44" height="32"/>
        <text class="svg-num" x="385" y="158">2</text>
        <rect class="svg-cell" x="408" y="142" width="44" height="32"/>
        <text class="svg-num" x="430" y="158">1</text>
        <rect class="svg-cell" x="453" y="142" width="44" height="32"/>
        <text class="svg-num" x="475" y="158">1</text>
      </g>

      <!-- Fragment 2: Softmax — weights -->
      <g class="fragment" data-fragment-index="2">
        <line class="svg-arrow" x1="500" y1="110" x2="545" y2="110"/>

        <text class="svg-heading" x="660" y="20">softmax(scores)</text>
        <text class="svg-text-xs svg-muted" x="660" y="35">rows sum to 1.0</text>

        <!-- Column headers -->
        <text class="svg-text-xs svg-muted" x="615" y="52">The</text>
        <text class="svg-text-xs svg-muted" x="660" y="52">cat</text>
        <text class="svg-text-xs svg-muted" x="705" y="52">sits</text>

        <!-- Row labels -->
        <text class="svg-text-xs svg-muted" x="572" y="78">The</text>
        <text class="svg-text-xs svg-muted" x="572" y="118">cat</text>
        <text class="svg-text-xs svg-muted" x="572" y="158">sits</text>

        <!-- Row 0: scores [1, -∞, -∞] → softmax = [1.0, 0, 0] -->
        <rect class="svg-cell-highlight" x="593" y="62" width="44" height="32"/>
        <text class="svg-num fill-accent" x="615" y="78">1.0</text>
        <rect class="svg-cell-blocked" x="638" y="62" width="44" height="32"/>
        <text class="svg-num svg-muted" x="660" y="78">0</text>
        <rect class="svg-cell-blocked" x="683" y="62" width="44" height="32"/>
        <text class="svg-num svg-muted" x="705" y="78">0</text>

        <!-- Row 1: scores [1, 1, -∞] → softmax = [.50, .50, 0] -->
        <rect class="svg-cell-highlight" x="593" y="102" width="44" height="32"/>
        <text class="svg-num fill-accent" x="615" y="118">.50</text>
        <rect class="svg-cell-highlight" x="638" y="102" width="44" height="32"/>
        <text class="svg-num fill-accent" x="660" y="118">.50</text>
        <rect class="svg-cell-blocked" x="683" y="102" width="44" height="32"/>
        <text class="svg-num svg-muted" x="705" y="118">0</text>

        <!-- Row 2: scores [2, 1, 1] → softmax ≈ [0.50, 0.25, 0.25] -->
        <rect class="svg-cell-highlight" x="593" y="142" width="44" height="32"/>
        <text class="svg-num fill-accent" x="615" y="158">.50</text>
        <rect class="svg-cell" x="638" y="142" width="44" height="32"/>
        <text class="svg-num" x="660" y="158">.25</text>
        <rect class="svg-cell" x="683" y="142" width="44" height="32"/>
        <text class="svg-num" x="705" y="158">.25</text>
      </g>

      <!-- Fragment 3: Weighted sum — attention weights × V -->
      <g class="fragment" data-fragment-index="3">
        <!-- Separator line -->
        <line x1="15" y1="200" x2="905" y2="200" stroke="var(--color-border, #1e293b)" stroke-width="1" opacity="0.5"/>

        <text class="svg-heading" x="460" y="222">Weighted sum: weights &times; V</text>

        <!-- Show the computation for "cat" as example -->
        <rect class="svg-accent-box" x="30" y="240" width="860" height="110"/>

        <!-- Label -->
        <text class="svg-label" style="font-size: 12px;" x="80" y="262">output "cat"</text>

        <!-- Equation -->
        <text class="svg-num" x="80" y="290">=</text>

        <!-- Weight × V_the -->
        <rect class="svg-result-box" x="100" y="276" width="36" height="26"/>
        <text class="svg-num fill-accent" x="118" y="289">.50</text>
        <text class="svg-op" x="148" y="289">&times;</text>
        <rect class="svg-box" x="160" y="276" width="60" height="26"/>
        <text class="svg-num" x="190" y="289">3, 1</text>
        <text class="svg-text-xs svg-muted" x="190" y="267">V_the</text>

        <!-- Plus -->
        <text class="svg-op" x="238" y="289">+</text>

        <!-- Weight × V_cat -->
        <rect class="svg-result-box" x="258" y="276" width="36" height="26"/>
        <text class="svg-num fill-accent" x="276" y="289">.50</text>
        <text class="svg-op" x="306" y="289">&times;</text>
        <rect class="svg-box" x="318" y="276" width="60" height="26"/>
        <text class="svg-num" x="348" y="289">0, 4</text>
        <text class="svg-text-xs svg-muted" x="348" y="267">V_cat</text>

        <!-- Plus (masked) -->
        <text class="svg-op svg-muted" x="396" y="289">+</text>

        <!-- Weight × V_sits (masked → 0) -->
        <rect class="svg-result-box" x="416" y="276" width="36" height="26" opacity="0.3"/>
        <text class="svg-num svg-muted" x="434" y="289">0</text>
        <text class="svg-op svg-muted" x="464" y="289">&times;</text>
        <rect class="svg-box" x="476" y="276" width="60" height="26" opacity="0.3"/>
        <text class="svg-num svg-muted" x="506" y="289">2, 2</text>
        <text class="svg-text-xs svg-muted" x="506" y="267">V_sits</text>

        <!-- Equals result -->
        <text class="svg-op" x="560" y="289">=</text>
        <rect class="svg-result-box svg-pulse" x="578" y="274" width="90" height="30"/>
        <text class="svg-num fill-accent" style="font-size: 16px;" x="623" y="289">1.50, 2.50</text>

        <!-- Explanation -->
        <text class="svg-formula" style="font-size: 12px;" x="460" y="330">"cat" pays 50% attention to "The", 50% to itself — "sits" is masked</text>
      </g>

      <!-- Fragment 4: Key insight -->
      <g class="fragment" data-fragment-index="4">
        <rect class="svg-insight-box" x="100" y="460" width="720" height="46"/>
        <text class="svg-text fill-accent" style="font-size: 15px;" x="460" y="483">
          Causal masking ensures tokens only look at the past — that is masked self-attention
        </text>
      </g>
    </svg>
  </div>
</section>
