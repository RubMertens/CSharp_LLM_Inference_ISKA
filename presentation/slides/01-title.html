                   values="22; 60; 14; 40; 22"/>

    .title-conic-wash {
      position: fixed;
      top: 50%; left: 50%;

      z-index: 0;

    @keyframes title-wash-spin {

      to   { transform: rotate(360deg); }

    /* slow hue-rotate pulsing on the conic wash */
