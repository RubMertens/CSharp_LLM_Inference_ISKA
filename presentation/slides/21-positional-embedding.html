<section data-id="positional-embedding" data-title="Positional Embedding">
  <div class="slide-content">
    <h2>Positional <span class="highlight">Embedding</span></h2>
    <p style="color: var(--color-text-muted); margin-bottom: 1rem;">Transformers have no built-in sense of word order</p>

    <div class="card" style="padding: 1.2rem; margin-bottom: 1.2rem;">
      <p style="text-align: center; font-size: 0.95em; margin-bottom: 0.5rem;">Without position info, these are <span class="highlight">identical</span> to the model:</p>
      <div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;">
        <code style="font-size: 0.9em; color: var(--color-accent);">"the cat sat on the mat"</code>
        <code style="font-size: 0.9em; color: var(--color-text-muted);">"mat the on sat cat the"</code>
      </div>
    </div>

    <div class="fragment svg-fill">
      <svg viewBox="0 0 800 320" class="svg-diagram" xmlns="http://www.w3.org/2000/svg">

        <!-- Label: Token embedding -->
        <text class="svg-text-xs svg-muted" x="400" y="20">Token embedding</text>

        <!-- Token boxes row -->
        <rect class="svg-box" x="30" y="30" width="100" height="40"/><text class="svg-text" x="80" y="50">The</text>
        <rect class="svg-box" x="155" y="30" width="100" height="40"/><text class="svg-text" x="205" y="50">cat</text>
        <rect class="svg-box" x="280" y="30" width="100" height="40"/><text class="svg-text" x="330" y="50">sat</text>
        <rect class="svg-box" x="405" y="30" width="100" height="40"/><text class="svg-text" x="455" y="50">on</text>
        <rect class="svg-box" x="530" y="30" width="100" height="40"/><text class="svg-text" x="580" y="50">the</text>
        <rect class="svg-box" x="655" y="30" width="100" height="40"/><text class="svg-text" x="705" y="50">mat</text>

        <!-- Plus signs -->
        <text class="svg-op" x="80" y="95">+</text>
        <text class="svg-op" x="205" y="95">+</text>
        <text class="svg-op" x="330" y="95">+</text>
        <text class="svg-op" x="455" y="95">+</text>
        <text class="svg-op" x="580" y="95">+</text>
        <text class="svg-op" x="705" y="95">+</text>

        <!-- Label: Position signal -->
        <text class="svg-text-xs svg-muted" x="400" y="115">Position signal</text>

        <!-- Position boxes -->
        <rect class="svg-accent-box" x="30" y="125" width="100" height="40"/><text class="svg-text fill-accent" x="80" y="145">pos 0</text>
        <rect class="svg-accent-box" x="155" y="125" width="100" height="40"/><text class="svg-text fill-accent" x="205" y="145">pos 1</text>
        <rect class="svg-accent-box" x="280" y="125" width="100" height="40"/><text class="svg-text fill-accent" x="330" y="145">pos 2</text>
        <rect class="svg-accent-box" x="405" y="125" width="100" height="40"/><text class="svg-text fill-accent" x="455" y="145">pos 3</text>
        <rect class="svg-accent-box" x="530" y="125" width="100" height="40"/><text class="svg-text fill-accent" x="580" y="145">pos 4</text>
        <rect class="svg-accent-box" x="655" y="125" width="100" height="40"/><text class="svg-text fill-accent" x="705" y="145">pos 5</text>

        <!-- Equals signs -->
        <text class="svg-op" x="80" y="190">=</text>
        <text class="svg-op" x="205" y="190">=</text>
        <text class="svg-op" x="330" y="190">=</text>
        <text class="svg-op" x="455" y="190">=</text>
        <text class="svg-op" x="580" y="190">=</text>
        <text class="svg-op" x="705" y="190">=</text>

        <!-- Label: Combined -->
        <text class="svg-text-xs svg-muted" x="400" y="210">Combined</text>

        <!-- Result boxes -->
        <rect class="svg-result-box" x="30" y="220" width="100" height="40"/><text class="svg-text" x="80" y="240">The₀</text>
        <rect class="svg-result-box" x="155" y="220" width="100" height="40"/><text class="svg-text" x="205" y="240">cat₁</text>
        <rect class="svg-result-box" x="280" y="220" width="100" height="40"/><text class="svg-text" x="330" y="240">sat₂</text>
        <rect class="svg-result-box" x="405" y="220" width="100" height="40"/><text class="svg-text" x="455" y="240">on₃</text>
        <rect class="svg-result-box" x="530" y="220" width="100" height="40"/><text class="svg-text" x="580" y="240">the₄</text>
        <rect class="svg-result-box" x="655" y="220" width="100" height="40"/><text class="svg-text" x="705" y="240">mat₅</text>
      </svg>  
    </div>
  </div>
</section>
