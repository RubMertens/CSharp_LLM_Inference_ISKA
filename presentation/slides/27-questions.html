    /* ===== slow rotating conic gradient wash ===== */

      position: fixed;

    /* ===== headline stage above the chrome ===== */
    .qq-stage {
      position: relative;
      z-index: 2;
      perspective: 800px;
    }

    /* ===== holographic animated headline w/ 3D wobble + glow pulse ===== */
    .qq-h1-wrap {
      position: relative;
      display: inline-block;
      padding: 0 2.5rem;
      transform-style: preserve-3d;
      animation: qq-h1-wobble 7s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes qq-h1-wobble {
      0%,100% { transform: translateY(0) rotateX(0deg) rotateY(0deg); }
      25%     { transform: translateY(-8px) rotateX(6deg) rotateY(-7deg); }
      50%     { transform: translateY(-12px) rotateX(0deg) rotateY(0deg); }
      75%     { transform: translateY(-8px) rotateX(-6deg) rotateY(7deg); }
    }
    .slide-title h1.qq-holo {
      background: linear-gradient(115deg,
        #ff4d9d 0%, #ff8a3d 18%, #ffe24d 36%,
        #4dff9d 54%, #38bdf8 72%, #a855f7 90%, #ff4d9d 100%);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      animation:
        qq-holo-slide 6s linear infinite,
        qq-holo-glow 2.4s ease-in-out infinite;
      will-change: background-position, filter;

    /* ===== shimmering animated underline ===== */
    .qq-underline {
      height: 5px;
      width: clamp(220px, 36vw, 460px);
      border-radius: 999px;
      margin: 0.5rem auto 0;
      background: linear-gradient(90deg, transparent, #ff4d9d, #ffe24d, #4dff9d, #38bdf8, #a855f7, transparent);
      background-size: 200% 100%;
      box-shadow: 0 0 22px rgba(56,189,248,0.9);
      animation: qq-underline-sweep 3s linear infinite,
                 qq-underline-pulse 2s ease-in-out infinite;

    @keyframes qq-underline-sweep {
      0%   { background-position: 200% 50%; }

    @keyframes qq-underline-pulse {

      50%     { transform: scaleX(1.12); }

    /* ===== QR block ===== */
    .qq-qr {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 2.2rem;
      animation: qq-qr-bob 4.5s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes qq-qr-bob {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-10px); }
    }
    /* animated conic-gradient border rings around the QR card */
    .qq-qr-card {
      position: relative;
      background: #ffffff;
      padding: 1rem;
      border-radius: 12px;
      animation: qq-qr-pulse 2.6s ease-in-out infinite;
      will-change: box-shadow;
    }
    .qq-qr-card::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 18px;
      padding: 8px;
      background: conic-gradient(from 0deg,
        #ff4d9d, #ff8a3d, #ffe24d, #4dff9d, #38bdf8, #a855f7, #ff4d9d);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      animation: qq-qr-ring-spin 4s linear infinite;
      z-index: -1;
      will-change: transform;
    }
    /* second outer ring spinning the other way */
    .qq-qr-card::after {
      content: "";
      position: absolute;
      inset: -16px;
      border-radius: 24px;
      padding: 3px;
      background: conic-gradient(from 180deg,
        #38bdf8, #a855f7, #ff4d9d, #ffe24d, #4dff9d, #38bdf8);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      opacity: 0.8;
      animation: qq-qr-ring-spin 7s linear infinite reverse;
      z-index: -1;
      will-change: transform;
    }
    @keyframes qq-qr-ring-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    /* glow cycles colors around card — does NOT touch the QR pixels */
